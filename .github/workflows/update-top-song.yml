name: Update top track

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch top track and update README
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          # 👇 REPLACE THIS with your Last.fm username
          LASTFM_USERNAME: YOUR_LASTFM_USERNAME
        run: node .github/scripts/update-top-song.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update top track of the week"
          git push
